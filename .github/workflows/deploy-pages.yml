name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: false
        run: npm ci --include=dev --workspaces --include-workspace-root --no-fund --no-audit

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_PUBLIC_BASE_PATH: ${{ vars.VITE_PUBLIC_BASE_PATH }}
          VITE_ENABLE_ADMIN_PAGE: ${{ vars.VITE_ENABLE_ADMIN_PAGE }}
          VITE_ENABLE_AUTH_PAGE: ${{ vars.VITE_ENABLE_AUTH_PAGE }}
          VITE_DEV_AUTO_LOGIN: ${{ vars.VITE_DEV_AUTO_LOGIN }}
        run: npm exec --workspace client vite build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4